# CI/CD Pipeline
# Triggers on every push to main branch
# Flow: run tests → build Docker images → push to DockerHub → deploy to K8s

name: Build and Deploy

on:
  push:
    branches: [main]      # only run on pushes to main

jobs:

  # ── Job 1: Run all tests ─────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run Spring Boot tests
        working-directory: backend
        run: mvn test

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run Go tests
        working-directory: go-service
        run: go test ./...

  # ── Job 2: Build and push Docker images ──────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test             # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Build and push go-service image
        uses: docker/build-push-action@v5
        with:
          context: ./go-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/go-service:latest

  # ── Job 3: Deploy to Kubernetes ───────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build            # only runs if build passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        # This secret holds your K8s cluster credentials
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Deploy Go service
        run: kubectl apply -f k8s/go-service.yml

      - name: Deploy Backend
        run: kubectl apply -f k8s/backend.yml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/go-service
          kubectl rollout status deployment/backend

      - name: Confirm deployment
        run: kubectl get pods