# application.yml
# Week 1: using H2 in-memory DB so you don't need to install anything

server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:journaldb   # lives in memory, resets on restart
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop      # auto creates tables on start
    show-sql: true               # prints SQL to console so you can see what's happening

  h2:
    console:
      enabled: true              # visit http://localhost:8080/h2-console to see your data


openai:
  # reads from environment variable — works both locally and in Docker
  api-key: ${OPENAI_API_KEY:sk-YOUR-KEY-HERE}
  model:   ${OPENAI_MODEL:gpt-3.5-turbo}

# Go service URL — changes depending on environment
go-service:
  url: ${GO_SERVICE_URL:http://localhost:9090/summarise}